server {
    listen 80;
    server_name _;
    server_tokens off;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=(), interest-cohort=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    # Report-Only: la app carga Google Fonts (fonts.googleapis.com/gstatic.com)
    # como recurso cross-origin. COEP en modo enforce (require-corp) bloquearía
    # esa carga porque Google Fonts no envía Cross-Origin-Resource-Policy. Se
    # deja en modo reporte hasta resolver esos recursos (self-host o exención).
    add_header Cross-Origin-Embedder-Policy-Report-Only "require-corp" always;
    # frame-src debe declarar 'blob:' de forma explícita: la palabra clave 'self'
    # NO cubre el esquema blob: (gotcha conocido de CSP), por lo que el visor de
    # PDF embebido (iframe con src=blob:...) quedaba bloqueado en producción.
    # Además, una URL blob: hereda la política CSP completa de la página que la
    # creó -incluido frame-ancestors-, así que con frame-ancestors 'none' el
    # propio blob se rechazaba a sí mismo al ser enmarcado. 'self' mantiene la
    # protección contra clickjacking de terceros y permite el auto-enmarcado.
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self'; frame-src 'self' blob:; object-src 'none'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

    location ~* \.(?:css|js|svg|png|jpg|jpeg|webp|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # SPA: cualquier ruta no encontrada cae a index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
