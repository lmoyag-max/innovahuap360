# Overrides de producción.
# Uso: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# El archivo base (docker-compose.yml) ya NO publica los puertos de
# PostgreSQL ni del backend al host (ver docker-compose.dev.yml para
# desarrollo local) — no hay nada que "quitar" aquí, solo se ajustan
# variables y políticas de reinicio:
# - Mailhog no aplica (no se usa --profile dev); configurar SMTP real.
# - RUN_SEED por defecto en false: el seed inicial se ejecuta una sola vez
#   de forma explícita, no en cada despliegue.
# - Swagger queda deshabilitado automáticamente (NODE_ENV=production).

services:
  backend:
    environment:
      NODE_ENV: production
      RUN_SEED: ${RUN_SEED:-false}
    restart: always

  frontend:
    restart: always

  nginx:
    restart: always
