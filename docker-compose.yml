name: innovahuap360

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-innovahuap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-innovahuap}
      POSTGRES_DB: ${POSTGRES_DB:-innovahuap360}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-innovahuap}']
      interval: 5s
      timeout: 5s
      retries: 10

  mailhog:
    image: mailhog/mailhog:v1.0.1
    restart: unless-stopped
    profiles: ['dev'] # solo se levanta con `docker compose --profile dev up`
    ports:
      - '8025:8025' # UI web de correos capturados

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3001
      API_PREFIX: api
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      DATABASE_URL: postgresql://${POSTGRES_USER:-innovahuap}:${POSTGRES_PASSWORD:-innovahuap}@postgres:5432/${POSTGRES_DB:-innovahuap360}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_TTL_DAYS: ${JWT_REFRESH_TTL_DAYS:-30}
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-no-reply@innovahuap.local}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-InnovaHUAP 360}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      INNOVAIA_PROVIDER: ${INNOVAIA_PROVIDER:-none}
      INNOVAIA_API_KEY: ${INNOVAIA_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@innovahuap.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:-}
      RUN_SEED: ${RUN_SEED:-true}
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/api/health']
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    environment:
      # Restringe qué variables sustituye Nginx en el .template al arrancar
      # (ver docker-compose.https.yml) — evita que envsubst toque por error
      # variables propias de Nginx como $host o $remote_addr.
      NGINX_ENVSUBST_FILTER: '^DOMAIN_NAME$'
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    ports:
      - '80:80'

volumes:
  postgres_data:
  backend_uploads:
